name: Issue
description: Bug, feature request, plugin idea, or general issue.
title: "Short description of your issue"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for opening an issue. Just write a short description in the title — the Domain you pick below will be prepended automatically when the issue is opened (e.g. `Runner: aider: <your title>`).

  - type: dropdown
    id: domain
    attributes:
      label: Domain
      description: Which part of the project is this about?
      options:
        - Core
        - "Runner: claude-cli"
        - "Runner: codex-cli"
        - "Runner: aider"
        - "Runner: new plugin"
        - "Tracker: github"
        - "Tracker: gitlab"
        - "Tracker: linear"
        - "Tracker: jira"
        - "Tracker: new plugin"
        - Other
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      description: What kind of issue is this?
      options:
        - Bug
        - Feature request
        - New plugin proposal
        - Question / discussion
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: For bugs — what's happening, what you expected, repro steps if you have them. For features/plugins — the use case and what you'd like to be able to do.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed approach
      description: Optional. Rough ideas for a fix, a config snippet, or an implementation sketch.

  - type: textarea
    id: related
    attributes:
      label: Related issues / PRs
      description: Optional. Links to anything connected.
