name: Release to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.1)"
        required: true
        type: string
        default: "0.0.1"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      TAG: v${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Determine if pre-release
        run: |
          if [[ "$VERSION" == *-* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Verify package versions match input
        run: |
          for pkg in packages/*/package.json; do
            actual=$(node -p "require('./${pkg}').version")
            if [ "$actual" != "$VERSION" ]; then
              echo "::error file=${pkg}::version mismatch — package=${actual} workflow_input=${VERSION}"
              exit 1
            fi
          done

      - name: Verify tag does not already exist
        run: |
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::tag ${TAG} already exists"
            exit 1
          fi

      - name: Determine npm dist-tag
        run: |
          # Pre-release versions (anything with a hyphen — e.g. 0.0.2-rc1)
          # publish under the "next" dist-tag so `npm install -g <pkg>` keeps
          # resolving to the previous stable release.
          if [[ "$VERSION" == *-* ]]; then
            echo "NPM_TAG=next" >> "$GITHUB_ENV"
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "NPM_TAG=latest" >> "$GITHUB_ENV"
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
          fi
          echo "Will publish with --tag $(grep '^NPM_TAG=' "$GITHUB_ENV" | tail -1)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        # Plugins (trackers/runners) import `@conduit-harness/conduit` and
        # resolve types via the package's `exports → dist/index.d.ts`.
        # Build core first so typecheck and test see the .d.ts files.
        # Mirrors the same step in `build-test.yml`.
        run: pnpm --filter @conduit-harness/conduit build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify package contents
        run: pnpm -r --filter "./packages/*" exec npm pack --dry-run

      - name: Publish all packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          # Iterate over every workspace package — guarantees a new package
          # added under packages/ is published automatically without a
          # workflow edit. Per-package failures don't fail the step; the
          # subsequent verify gate is the source of truth.
          for dir in packages/*/; do
            [ -f "${dir}package.json" ] || continue
            pkg=$(node -p "require('./${dir}package.json').name")
            echo "::group::Publish ${pkg}"
            if ( npm view "${pkg}@${VERSION}" version 2>/dev/null || true ) | grep -qF "${VERSION}"; then
              echo "Already published, skipping"
              echo "::endgroup::"
              continue
            fi
            (
              cd "$dir"
              output=$(npm publish --access public --tag "${NPM_TAG}" 2>&1) && code=0 || code=$?
              echo "$output"
              if [ "$code" -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
                echo "Already published, skipping"
                exit 0
              fi
              if [ "$code" -ne 0 ]; then
                echo "::warning::Failed to publish ${pkg} (exit ${code}), will be caught by verify step"
              fi
              exit 0
            )
            echo "::endgroup::"
          done

      - name: Verify all packages published
        run: |
          # Iterate over the same source of truth (packages/*) so a missed
          # publish is always caught. npm's registry is briefly inconsistent
          # right after publish, so each package gets up to ~60s of polling.
          failed=0
          for dir in packages/*/; do
            [ -f "${dir}package.json" ] || continue
            pkg=$(node -p "require('./${dir}package.json').name")
            ok=0
            for attempt in 1 2 3 4 5 6; do
              if ( npm view "${pkg}@${VERSION}" version 2>/dev/null || true ) | grep -qF "${VERSION}"; then
                echo "✓ ${pkg}@${VERSION}"
                ok=1
                break
              fi
              if [ "$attempt" -lt 6 ]; then
                echo "… ${pkg}@${VERSION} not visible yet, retrying in 10s (attempt ${attempt}/6)"
                sleep 10
              fi
            done
            if [ "$ok" -eq 0 ]; then
              echo "✗ ${pkg}@${VERSION} — NOT found on npm after 60s"
              failed=1
            fi
          done
          exit $failed

      - name: Drop implicit 'latest' on first-publish pre-releases
        if: env.PRERELEASE == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in packages/*/; do
            [ -f "${dir}package.json" ] || continue
            pkg=$(node -p "require('./${dir}package.json').name")
            latest=$(npm view "${pkg}" dist-tags.latest 2>/dev/null || echo "")
            if [ "$latest" = "$VERSION" ]; then
              echo "Removing implicit 'latest' tag from ${pkg} (was set to ${VERSION} on first publish)"
              npm dist-tag rm "${pkg}" latest || true
            fi
          done

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          prerelease: ${{ env.PRERELEASE == 'true' }}
