name: Release to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.1)"
        required: true
        type: string
        default: "0.0.1"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      TAG: v${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Verify package versions match input
        run: |
          for pkg in packages/*/package.json; do
            actual=$(node -p "require('./${pkg}').version")
            if [ "$actual" != "$VERSION" ]; then
              echo "::error file=${pkg}::version mismatch — package=${actual} workflow_input=${VERSION}"
              exit 1
            fi
          done

      - name: Verify tag does not already exist
        run: |
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::tag ${TAG} already exists"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify package contents
        run: pnpm -r --filter "./packages/*" exec npm pack --dry-run

      - name: Publish @conduit-harness/conduit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/conduit
          output=$(npm publish --access public 2>&1); code=$?; echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
            echo "Already published, skipping"; exit 0
          fi
          exit $code

      - name: Publish @conduit-harness/conduit-tracker-github
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/conduit-tracker-github
          output=$(npm publish --access public 2>&1); code=$?; echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
            echo "Already published, skipping"; exit 0
          fi
          exit $code

      - name: Publish @conduit-harness/conduit-tracker-linear
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/conduit-tracker-linear
          output=$(npm publish --access public 2>&1); code=$?; echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
            echo "Already published, skipping"; exit 0
          fi
          exit $code

      - name: Publish @conduit-harness/conduit-tracker-gitlab
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/conduit-tracker-gitlab
          output=$(npm publish --access public 2>&1); code=$?; echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
            echo "Already published, skipping"; exit 0
          fi
          exit $code

      - name: Publish @conduit-harness/conduit-tracker-jira
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/conduit-tracker-jira
          output=$(npm publish --access public 2>&1); code=$?; echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
            echo "Already published, skipping"; exit 0
          fi
          exit $code

      - name: Publish @conduit-harness/conduit-runner-claude-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/conduit-runner-claude-cli
          output=$(npm publish --access public 2>&1); code=$?; echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
            echo "Already published, skipping"; exit 0
          fi
          exit $code

      - name: Publish @conduit-harness/conduit-runner-codex-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/conduit-runner-codex-cli
          output=$(npm publish --access public 2>&1); code=$?; echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
            echo "Already published, skipping"; exit 0
          fi
          exit $code

      - name: Publish @conduit-harness/conduit-runner-openai-api
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          cd packages/conduit-runner-openai-api
          output=$(npm publish --access public 2>&1); code=$?; echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
            echo "Already published, skipping"; exit 0
          fi
          exit $code

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
