services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  mock-github:
    image: node:24-alpine
    working_dir: /srv
    volumes:
      - ./mock-github:/srv:ro
    command: ["node", "/srv/server.mjs"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- --header='Authorization: Bearer x' http://localhost:3000/repos/testorg/testrepo/issues || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10

  conduit:
    build:
      context: ../..
      dockerfile: examples/docker-ollama-github/Dockerfile
    depends_on:
      ollama:
        condition: service_healthy
      mock-github:
        condition: service_healthy
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:0.5b}
      OLLAMA_BASE: http://ollama:11434
      GITHUB_TOKEN: ${GITHUB_TOKEN:-mock-token}
    volumes:
      - conduit-repo:/repo

volumes:
  ollama-models:
  conduit-repo:
