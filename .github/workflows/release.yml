name: Release to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)release, e.g. v0.1.0"
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.derive.outputs.version }}
      tag: ${{ steps.derive.outputs.tag }}
      prerelease: ${{ steps.derive.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Derive version from tag
        id: derive
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${REF}"        >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${REF} (version ${VERSION}, prerelease=${PRERELEASE})"

      - name: Verify package versions match tag
        env:
          VERSION: ${{ steps.derive.outputs.version }}
        run: |
          for pkg in packages/*/package.json; do
            actual=$(node -p "require('./${pkg}').version")
            if [ "$actual" != "$VERSION" ]; then
              echo "::error file=${pkg}::version mismatch — package=${actual} tag=${VERSION}"
              exit 1
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        # Plugins (trackers/runners) import `@conduit-harness/conduit` and
        # resolve types via the package's `exports → dist/index.d.ts`.
        # Build core first so typecheck and test see the .d.ts files.
        # Mirrors the same step in `build-test.yml`.
        run: pnpm --filter @conduit-harness/conduit build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify package contents
        run: pnpm -r --filter "./packages/*" exec npm pack --dry-run

      - name: Pre-flight — report already-published packages
        env:
          VERSION: ${{ steps.derive.outputs.version }}
        run: |
          for dir in packages/*/; do
            [ -f "${dir}package.json" ] || continue
            pkg=$(node -p "require('./${dir}package.json').name")
            if ( npm view "${pkg}@${VERSION}" version 2>/dev/null || true ) | grep -qF "${VERSION}"; then
              echo "  ${pkg}@${VERSION} — already on npm, will be skipped"
            else
              echo "  ${pkg}@${VERSION} — not yet published, will be published"
            fi
          done

      - name: Trusted Publisher checklist
        run: |
          {
            echo "## Trusted Publisher checklist"
            echo
            echo "Each package below must have this repo + workflow configured as a Trusted Publisher on npmjs.com."
            echo "If a publish step later fails with 401/403, open the link and configure it"
            echo "(repo: \`conduit-harness/conduit\`, workflow: \`release.yml\`, environment: leave blank), then re-run."
            echo
            for dir in packages/*/; do
              [ -f "${dir}package.json" ] || continue
              pkg=$(node -p "require('./${dir}package.json').name")
              echo "- [ ] [${pkg}](https://www.npmjs.com/package/${pkg}/access)"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tar built packages
        run: |
          tar \
            --exclude='packages/*/node_modules' \
            --exclude='packages/*/src' \
            --exclude='packages/*/test' \
            --exclude='packages/*/tsconfig*.json' \
            -czf built-packages.tar.gz packages

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: built-packages
          path: built-packages.tar.gz
          retention-days: 7

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: built-packages

      - name: Extract built packages
        run: tar -xzf built-packages.tar.gz

      - name: Determine npm dist-tag
        run: |
          if [[ "$VERSION" == *-* ]]; then
            echo "NPM_TAG=next" >> "$GITHUB_ENV"
          else
            echo "NPM_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Publish all packages
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          # Iterate over every workspace package — guarantees a new package
          # added under packages/ is published automatically without a
          # workflow edit. Per-package failures stop fast; the skip-if-published
          # guard at the top of each loop is the idempotency net.
          for dir in packages/*/; do
            [ -f "${dir}package.json" ] || continue
            pkg=$(node -p "require('./${dir}package.json').name")
            echo "::group::Publish ${pkg}"
            if ( npm view "${pkg}@${VERSION}" version 2>/dev/null || true ) | grep -qF "${VERSION}"; then
              echo "Already published, skipping"
              echo "::endgroup::"
              continue
            fi
            (
              cd "$dir"
              output=$(npm publish --access public --tag "${NPM_TAG}" 2>&1) && code=0 || code=$?
              echo "$output"
              if [ "$code" -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
                echo "Already published (race), skipping"
                exit 0
              fi
              exit "$code"
            )
            echo "::endgroup::"
          done

      - name: Drop implicit 'latest' on first-publish pre-releases
        if: needs.prepare.outputs.prerelease == 'true'
        run: |
          for dir in packages/*/; do
            [ -f "${dir}package.json" ] || continue
            pkg=$(node -p "require('./${dir}package.json').name")
            latest=$(npm view "${pkg}" dist-tags.latest 2>/dev/null || echo "")
            if [ "$latest" = "$VERSION" ]; then
              echo "Removing implicit 'latest' tag from ${pkg} (was set to ${VERSION} on first publish)"
              npm dist-tag rm "${pkg}" latest || true
            fi
          done

  release:
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Post-publish visibility check (warning only)
        run: |
          # Registry replication lag means a package may not be visible immediately
          # after publish. Emit warnings rather than failing so the GitHub release
          # is still created. The publish step above is the source of truth.
          for dir in packages/*/; do
            [ -f "${dir}package.json" ] || continue
            pkg=$(node -p "require('./${dir}package.json').name")
            if ( npm view "${pkg}@${VERSION}" version 2>/dev/null || true ) | grep -qF "${VERSION}"; then
              echo "  ${pkg}@${VERSION} visible on npm"
            else
              echo "::warning::${pkg}@${VERSION} not yet visible on npm (registry may still be propagating)"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
