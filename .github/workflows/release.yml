name: Release to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.1). Use for re-runs — the tag must already exist."
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  prepare:
    name: Build & test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      npm_tag: ${{ steps.resolve.outputs.npm_tag }}
    steps:
      - name: Resolve tag and version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
            NPM_TAG=next
          else
            PRERELEASE=false
            NPM_TAG=latest
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "npm_tag=${NPM_TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Verify package versions match tag
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          for pkg in packages/*/package.json; do
            actual=$(node -p "require('./${pkg}').version")
            if [ "$actual" != "$VERSION" ]; then
              echo "::error file=${pkg}::version mismatch — package=${actual} tag=${VERSION}"
              exit 1
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        # Plugins import @conduit-harness/conduit and resolve types via dist/index.d.ts.
        # Build core first so typecheck sees the .d.ts files.
        run: pnpm --filter @conduit-harness/conduit build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack packages
        run: |
          mkdir -p /tmp/tarballs
          for dir in packages/*/; do
            [ -f "${dir}package.json" ] || continue
            (cd "$dir" && npm pack --pack-destination /tmp/tarballs)
          done

      - name: Upload tarballs
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarballs
          path: /tmp/tarballs/*.tgz
          retention-days: 1

  publish:
    name: Publish to npm (OIDC)
    needs: prepare
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      NPM_TAG: ${{ needs.prepare.outputs.npm_tag }}
      PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
    steps:
      - name: Download tarballs
        uses: actions/download-artifact@v4
        with:
          name: npm-tarballs
          path: /tmp/tarballs

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish all packages
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          for tarball in /tmp/tarballs/*.tgz; do
            tmp=$(mktemp --suffix=.json)
            tar xOf "$tarball" package/package.json > "$tmp"
            pkg=$(node -p "require('$tmp').name")
            rm -f "$tmp"
            echo "::group::Publish ${pkg}"
            if ( npm view "${pkg}@${VERSION}" version 2>/dev/null || true ) | grep -qF "${VERSION}"; then
              echo "Already published, skipping"
              echo "::endgroup::"
              continue
            fi
            output=$(npm publish "$tarball" --access public --tag "${NPM_TAG}" 2>&1) && code=0 || code=$?
            echo "$output"
            if [ "$code" -ne 0 ] && echo "$output" | grep -qE "E409|already exists|previously published"; then
              echo "Already published, skipping"
            elif [ "$code" -ne 0 ]; then
              echo "::warning::Failed to publish ${pkg} (exit ${code})"
            fi
            echo "::endgroup::"
          done

      - name: Verify all packages published
        run: |
          # npm's registry is briefly inconsistent after a first-time publish.
          # Each package gets up to ~60 s of polling. Failure is downgraded to a
          # warning — the pre-publish skip-if-already-published guard is the real
          # safety net, and first-publish indexing lag is a known npm behaviour.
          for tarball in /tmp/tarballs/*.tgz; do
            tmp=$(mktemp --suffix=.json)
            tar xOf "$tarball" package/package.json > "$tmp"
            pkg=$(node -p "require('$tmp').name")
            rm -f "$tmp"
            ok=0
            for attempt in 1 2 3 4 5 6; do
              if ( npm view "${pkg}@${VERSION}" version 2>/dev/null || true ) | grep -qF "${VERSION}"; then
                echo "✓ ${pkg}@${VERSION}"
                ok=1
                break
              fi
              if [ "$attempt" -lt 6 ]; then
                echo "… ${pkg}@${VERSION} not visible yet, retrying in 10s (attempt ${attempt}/6)"
                sleep 10
              fi
            done
            if [ "$ok" -eq 0 ]; then
              echo "::warning::${pkg}@${VERSION} not visible on npm after 60 s — first-publish indexing lag; verify manually"
            fi
          done

      - name: Drop implicit 'latest' on first-publish pre-releases
        if: env.PRERELEASE == 'true'
        run: |
          # npm sets 'latest' automatically on first publish of any version.
          # For pre-releases this is wrong — undo it so stable 'latest' is preserved.
          # npm publish (above) obtained a short-lived OIDC-derived token that
          # persists in this session, so dist-tag rm can reuse it without NPM_TOKEN.
          for tarball in /tmp/tarballs/*.tgz; do
            tmp=$(mktemp --suffix=.json)
            tar xOf "$tarball" package/package.json > "$tmp"
            pkg=$(node -p "require('$tmp').name")
            rm -f "$tmp"
            latest=$(npm view "${pkg}" dist-tags.latest 2>/dev/null || echo "")
            if [ "$latest" = "$VERSION" ]; then
              echo "Removing implicit 'latest' tag from ${pkg} (was set to ${VERSION} on first publish)"
              npm dist-tag rm "${pkg}" latest || true
            fi
          done

      - name: Trusted Publisher checklist
        run: |
          {
            echo "## Trusted Publisher checklist"
            echo ""
            echo "Each package must have a Trusted Publisher configured on npmjs.com."
            echo "Required condition: **Repository** = \`conduit-harness/conduit\` · **Workflow** = \`release.yml\`"
            echo ""
            echo "| Package | Access settings |"
            echo "| ------- | --------------- |"
            for tarball in /tmp/tarballs/*.tgz; do
              tmp=$(mktemp --suffix=.json)
              tar xOf "$tarball" package/package.json > "$tmp"
              pkg=$(node -p "require('$tmp').name")
              rm -f "$tmp"
              echo "| \`${pkg}\` | [npmjs.com/package/${pkg}/access](https://www.npmjs.com/package/${pkg}/access) |"
            done
            echo ""
            echo "If a publish failed with an auth error, the Trusted Publisher is missing or misconfigured for that package."
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: GitHub Release
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
